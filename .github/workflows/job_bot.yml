name: LinkedIn Job Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours
  workflow_dispatch:          # Also allows manual trigger

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run job bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python job_bot.py
```

Push this file and **your bot will run automatically every 6 hours** — no PC needed, completely free.

---

### ✅ Option B: Railway.app (Always-On, Free Tier)

If you want it running continuously rather than on a schedule:
1. Go to [railway.app](https://railway.app) → sign in with GitHub
2. **New Project → Deploy from GitHub** → select your repo
3. Add environment variables: `TELEGRAM_TOKEN` and `CHAT_ID`
4. Add a `requirements.txt`:
```
   requests
   beautifulsoup4
```
5. Railway will keep it running 24/7

